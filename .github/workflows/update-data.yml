name: Actualizare Automata Date & Blog

# Optimizat 19.06.2026: 3 rulări/zi (nu 9) → ~70% mai puține minute GitHub Actions.
# - 05:00 + 17:00 UTC = sync date (07:00 + 19:00 RO) — doar API + merge + commit
# - 06:00 UTC = pipeline complet (08:00 RO) — blog, social, newsletter, video
on:
  schedule:
    - cron: '0 5,17 * * *'  # Sync date de 2 ori/zi (07:00 + 19:00 ora Romaniei)
    - cron: '0 6 * * *'      # Pipeline complet dimineata (08:00 ora Romaniei)
  workflow_dispatch:        # Buton manual in GitHub -> Actions (ruleaza tot)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Pipeline complet: dimineata + rulare manuala. Sync-urile 05/17 UTC sunt doar date.
      IS_FULL_DAILY: ${{ github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch' }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaleaza dependinte
        run: |
          python --version
          pip install -r scripts/requirements.txt

      # ── 3. 2Performant data — API direct ──────────────────────────────────
      - name: Fetch date 2Performant via API
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_2p_api cu email+parola..."
            python fetch_2p_api.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — ruleaza process_data.py cu date existente"
            python process_data.py
          fi

      # ── 4. Profitshare (optional) ─────────────────────────────────────────
      - name: Proceseaza date Profitshare
        working-directory: scripts
        env:
          PROFITSHARE_USER: ${{ secrets.PROFITSHARE_USER }}
          PROFITSHARE_KEY:  ${{ secrets.PROFITSHARE_KEY }}
        run: |
          if [ -n "$PROFITSHARE_USER" ]; then
            echo "Ruleaza Profitshare..."
            python process_profitshare.py
          else
            echo "PROFITSHARE_USER nu e setat — skip Profitshare"
          fi

      # ── 4b. TradeTracker (optional) ───────────────────────────────────────
      - name: Fetch date TradeTracker Romania
        working-directory: scripts
        env:
          TRADETRACKER_SITE_ID: ${{ secrets.TRADETRACKER_SITE_ID }}
          TRADETRACKER_API_KEY: ${{ secrets.TRADETRACKER_API_KEY }}
        run: |
          if [ -n "$TRADETRACKER_SITE_ID" ]; then
            echo "Ruleaza TradeTracker..."
            python fetch_tradetracker.py
          else
            echo "TRADETRACKER_SITE_ID nu e setat — skip TradeTracker"
          fi

      # ── 4c. Impact.com tracking links ────────────────────────────────────
      - name: Actualizeaza tracking links Impact.com
        working-directory: scripts
        continue-on-error: true
        env:
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN:  ${{ secrets.IMPACT_AUTH_TOKEN }}
        run: |
          if [ -n "$IMPACT_ACCOUNT_SID" ]; then
            echo "Ruleaza fetch_impact_api..."
            python fetch_impact_api.py
          else
            echo "IMPACT_ACCOUNT_SID nu e setat — skip Impact.com"
          fi

      # ── 5. Merge platforme ─────────────────────────────────────────────────
      - name: Merge 2Performant + Profitshare + TradeTracker + Impact
        working-directory: scripts
        run: python merge_platforms.py

      # ── 5a. Import promotii din CSV 2Performant (data/promotii_2p.csv) ─────
      # Multe programe acceptate cu promotii reale NU vin prin API. Importul
      # adauga promotiile + creeaza magazine noi cu link afiliat 2P real.
      # Expira automat promotiile trecute. Alex inlocuieste CSV-ul cand exporta.
      - name: Import promotii CSV 2Performant
        continue-on-error: true
        working-directory: scripts
        run: |
          if [ -f ../data/promotii_2p.csv ]; then
            python import_csv_promotii.py
          else
            echo "data/promotii_2p.csv lipsa — skip import CSV"
          fi

      # ── 5b. Alerte de pret per magazin (Brevo, ALERT_STORES) ────────────────
      - name: Verifica si trimite alerte cod nou pe magazin
        continue-on-error: true
        working-directory: scripts
        env:
          BREVO_API_KEY:      ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID:      "2"
          BREVO_SENDER_EMAIL: newsletter@amcupon.ro
          BREVO_SENDER_NAME:  AmCupon.ro
        run: |
          if [ -n "$BREVO_API_KEY" ]; then
            echo "Verific coduri noi si trimit alerte..."
            python check_price_alerts.py
          else
            echo "BREVO_API_KEY nu e setat — skip alerte de pret"
          fi

      # ── 6. Product Feeds API ──────────────────────────────────────────────
      - name: Fetch product feeds (2Performant API)
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_product_feeds..."
            python fetch_product_feeds.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — skip product feeds"
          fi

      # ── 6b. Imbogatire produse din promotii active ────────────────────────
      - name: Injecteaza promo-produse cu discount in products.json
        working-directory: scripts
        run: python enrich_products_from_promos.py

      # ── 7. Bannere campanii (2Performant) — doar pipeline complet ─────────
      - name: Fetch bannere campanii (2Performant API)
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_banners..."
            python fetch_banners.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — skip bannere"
          fi

      # ── 8. Blog automat (doar pipeline complet dimineata) ───────────────────
      - name: Genereaza articole blog din promotii active
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_blog.py

      - name: Genereaza articole Cel mai bun X
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_best_of.py

      - name: Genereaza ghiduri calitative cu Claude AI
        working-directory: scripts
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Ruleaza generate_ai_guides..."
            python generate_ai_guides.py
          else
            echo "ANTHROPIC_API_KEY nu e setat — skip ghiduri AI"
          fi

      - name: Actualizeaza link-uri afiliate in Top Produse
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_product_tops.py

      # ── 8b. Date lightweight homepage ──────────────────────────────────────
      - name: Genereaza date lightweight homepage
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_homepage_data.py

      # ── 8c. Descrieri editoriale magazine (--force = refresh cu promotii curente) ─
      - name: Genereaza descrieri magazine
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_store_descriptions.py --force

      # ── 8d. Prioritizare magazine ──────────────────────────────────────────
      - name: Genereaza top magazine (potential castig)
        if: env.IS_FULL_DAILY == 'true'
        working-directory: scripts
        run: python generate_merchant_priority.py

      # ── 9. Newsletter zilnic (Brevo SMTP) — DOAR la 08:00 Romania ──────────
      - name: Trimite newsletter zilnic
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          BREVO_SMTP_USER:    ${{ secrets.BREVO_SMTP_USER }}
          BREVO_SMTP_PASS:    ${{ secrets.BREVO_SMTP_PASS }}
          BREVO_API_KEY:      ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID:      "2"
          BREVO_SENDER_EMAIL: newsletter@amcupon.ro
          BREVO_SENDER_NAME:  AmCupon.ro
        run: |
          if [ -n "$BREVO_API_KEY" ]; then
            echo "Trimite newsletter via Brevo API..."
            python send_newsletter.py
          else
            echo "BREVO_API_KEY nu e setat — skip newsletter (acesta e folosit pentru campanie, nu BREVO_SMTP_PASS)"
          fi

      # ── 10. Telegram canal oferte ──────────────────────────────────────────
      - name: Postare Telegram canal oferte
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python telegram_daily.py
          python post_telegram.py

      # ── 11. Generator continut social media pe nise ────────────────────────
      - name: Genereaza continut social media pe nise
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        run: python generate_social_content.py

      # ── 11.5 Radarul AmCupon — digest editorial zilnic ───────────────────
      # Produce frontend/public/digest-today.json (pagina /radar) + data/digest-today.txt.
      # Ruleaza la fiecare update ca /radar sa reflecte mereu ofertele curente.
      # Voce: Claude haiku daca ANTHROPIC_API_KEY e setat, altfel fallback determinist (gratis).
      - name: Genereaza Radarul AmCupon (digest editorial)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_daily_digest.py

      # ── 11.6 Flux video AI zilnic — TikTok / Reels / Shorts ──────────────
      # digest-today.json -> script vocal -> edge-tts (voce RO + subtitrari) ->
      # ffmpeg (MP4 vertical 1080x1920 pe brand). 100% gratuit, fara API key platit.
      # Ruleaza doar dimineata (un clip/zi e suficient). ffmpeg e preinstalat in
      # ubuntu-latest; edge-tts vine din requirements.txt.
      - name: Genereaza video zilnic (TikTok/Reels/Shorts)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        run: |
          python generate_video_daily.py
          # Copiaza in public/ ca sa fie descarcabile de pe telefon (amcupon.ro/...)
          if [ -f ../data/video-today/video-today.mp4 ]; then
            cp ../data/video-today/video-today.mp4 ../frontend/public/video-today.mp4
            cp ../data/video-today/captions.txt    ../frontend/public/video-captions.txt
            cp ../data/video-today/script.txt      ../frontend/public/video-script.txt
            echo "Video zilnic gata: https://amcupon.ro/video-today.mp4"
          else
            echo "Video negenerat (edge-tts/ffmpeg indisponibil) — skip copiere"
          fi

      # ── 12. Genereaza bannere (Pillow) ────────────────────────────────────
      # Salveaza in data/ SI frontend/public/ (servit de Vercel)
      - name: Genereaza bannere sociale (Pillow)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        run: python generate_banner_auto.py

      # ── 13. Health check ──────────────────────────────────────────────────
      - name: Health check — verifica freshness output.json
        continue-on-error: true
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python health_check.py

      # ── 14. Commit & Push ─────────────────────────────────────────────────
      # IMPORTANT: commit INAINTE de social posting
      # Asa bannerele sunt live pe amcupon.ro cand postam pe Instagram
      - name: Commit si push date actualizate
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/public/output.json          || true
          git add frontend/public/digest-today.json    || true
          git add data/digest-today.txt                || true
          git add frontend/public/nav-index.json       || true
          git add frontend/public/blog-posts.json      || true
          git add frontend/public/blog-latest.json     || true
          git add frontend/public/products.json        || true
          git add frontend/public/products-home.json   || true
          git add frontend/public/recomandate.json     || true
          git add frontend/public/store-descriptions.json || true
          git add frontend/public/banner-daily.png     || true
          git add frontend/public/banner-story.png     || true
          git add data/RAPORT-TOP-CASTIG.md            || true
          git add frontend/public/banners.json         || true
          git add frontend/public/top-produse.json     || true
          git add data/output.json                     || true
          git add data/price_alert_snapshot.json       || true
          git add data/profitshare_output.json         || true
          git add data/banners_raw_debug.json          || true
          git add data/social-content.json             || true
          git add data/social-content-today.txt        || true
          git add "data/social-nisa-*.txt"             || true
          git add frontend/public/video-today.mp4      || true
          git add frontend/public/video-captions.txt   || true
          git add frontend/public/video-script.txt     || true
          git add data/banner_daily.png                || true
          git add data/banner_story.png                || true
          git add data/indexnow_seen.json               || true

          if git diff --staged --quiet; then
            echo "Nicio schimbare — skip commit"
          else
            git commit -m "chore: actualizare automata $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && echo "Date noi publicate — Vercel redeploys automat" && break
              echo "Push esuat (tentativa $i/5) — retrying in ${i}0s..."
              sleep $((i * 10))
            done
          fi

      # ── 14b. IndexNow — anunta Bing/Yandex de pagini noi (fara cont) ──────
      - name: Trimite URL-uri noi catre IndexNow (Bing/Yandex)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        run: python submit_indexnow.py

      # ── 15. Social Media — DUPA commit, ca bannerele sa fie live ──────────

      # ── 15a. Postare via Make.com webhook (NU necesita token Meta) ─────────
      # O singura postare/zi (dimineata). Post manual pranz/seara din Meta Suite daca vrei.
      - name: Postare automata via Make.com webhook (FB + IG)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          # Banner live pe Vercel dupa commit+push de mai sus
          BANNER_PUBLIC_URL: "https://amcupon.ro/banner-daily.png"
          BANNER_STORY_URL:  "https://amcupon.ro/banner-story.png"
        run: python post_via_webhook.py

      # ── 15b. Postare directa Facebook API (daca ai token Meta) ────────────
      # Alternativa la Make.com — necesita FACEBOOK_PAGE_TOKEN in Secrets
      # Cum obtii token: vezi scripts/SETUP-MAKE-COM.md sectiunea "Alternativa"
      - name: Postare automata Facebook Page (API direct)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: python post_facebook.py

      # ── 15c. Postare directa Instagram API (daca ai token Meta) ──────────
      # Alternativa la Make.com — necesita INSTAGRAM_ACCESS_TOKEN in Secrets
      - name: Postare automata Instagram Business (API direct)
        if: env.IS_FULL_DAILY == 'true'
        continue-on-error: true
        working-directory: scripts
        env:
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          # Banner live pe Vercel (raw GitHub ca backup)
          BANNER_PUBLIC_URL: "https://amcupon.ro/banner-daily.png"
        run: python post_instagram.py
