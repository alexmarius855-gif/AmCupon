name: Actualizare Automata Date & Blog

on:
  schedule:
    - cron: '0 */4 * * *'  # Date fresh la fiecare 4 ore (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 6 * * *'    # Newsletter + Social dimineata — zilnic la 08:00 ora Romaniei
    - cron: '0 17 * * *'   # Social seara — zilnic la 19:00 ora Romaniei (17:00 UTC)
  workflow_dispatch:        # Buton manual in GitHub → Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaleaza dependinte
        run: |
          python --version
          pip install -r scripts/requirements.txt

      # ── 3. 2Performant data — API direct ──────────────────────────────────
      - name: Fetch date 2Performant via API
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_2p_api cu email+parola..."
            python fetch_2p_api.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — ruleaza process_data.py cu date existente"
            python process_data.py
          fi

      # ── 4. Profitshare (optional — necesar secret PROFITSHARE_USER) ────────
      - name: Proceseaza date Profitshare
        working-directory: scripts
        env:
          PROFITSHARE_USER: ${{ secrets.PROFITSHARE_USER }}
          PROFITSHARE_KEY:  ${{ secrets.PROFITSHARE_KEY }}
        run: |
          if [ -n "$PROFITSHARE_USER" ]; then
            echo "Ruleaza Profitshare..."
            python process_profitshare.py
          else
            echo "PROFITSHARE_USER nu e setat — skip Profitshare"
          fi

      # ── 4b. TradeTracker (optional — necesar secret TRADETRACKER_SITE_ID) ──
      - name: Fetch date TradeTracker Romania
        working-directory: scripts
        env:
          TRADETRACKER_SITE_ID: ${{ secrets.TRADETRACKER_SITE_ID }}
          TRADETRACKER_API_KEY: ${{ secrets.TRADETRACKER_API_KEY }}
        run: |
          if [ -n "$TRADETRACKER_SITE_ID" ]; then
            echo "Ruleaza TradeTracker..."
            python fetch_tradetracker.py
          else
            echo "TRADETRACKER_SITE_ID nu e setat — skip TradeTracker"
          fi

      # ── 5. Merge platforme ─────────────────────────────────────────────────
      - name: Merge 2Performant + Profitshare + TradeTracker
        working-directory: scripts
        run: python merge_platforms.py

      # ── 6. Product Feeds API ──────────────────────────────────────────────
      - name: Fetch product feeds (2Performant API)
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_product_feeds..."
            python fetch_product_feeds.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — skip product feeds"
          fi

      # ── 7. Bannere campanii (2Performant) ────────────────────────────────────
      - name: Fetch bannere campanii (2Performant API)
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_EMAIL: ${{ secrets.TWOPEFORMANT_EMAIL }}
          TWOPEFORMANT_PASS:  ${{ secrets.TWOPEFORMANT_PASS }}
        run: |
          if [ -n "$TWOPEFORMANT_EMAIL" ]; then
            echo "Ruleaza fetch_banners..."
            python fetch_banners.py
          else
            echo "TWOPEFORMANT_EMAIL nu e setat — skip bannere"
          fi

      # ── 8. Blog automat ────────────────────────────────────────────────────
      - name: Genereaza articole blog din promotii active
        working-directory: scripts
        run: python generate_blog.py

      - name: Genereaza articole Cel mai bun X
        working-directory: scripts
        run: python generate_best_of.py

      - name: Actualizeaza link-uri afiliate in Top Produse
        working-directory: scripts
        run: python generate_product_tops.py

      # ── 8b. Date lightweight homepage (reduce payload ~1MB) ────────────────
      - name: Genereaza date lightweight homepage
        working-directory: scripts
        run: python generate_homepage_data.py

      # ── 8c. Descrieri editoriale magazine (continut SEO unic, fara AI) ─────
      - name: Genereaza descrieri magazine
        working-directory: scripts
        run: python generate_store_descriptions.py --force

      # ── 8d. Prioritizare magazine dupa potential de castig ────────────────
      - name: Genereaza top magazine (potential castig)
        working-directory: scripts
        run: python generate_merchant_priority.py

      # ── 9. Newsletter zilnic (Brevo SMTP) — rulat DOAR la 08:00 Romania ────
      - name: Trimite newsletter zilnic
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        continue-on-error: true   # non-critic — nu trebuie sa blocheze commit/push-ul datelor
        working-directory: scripts
        env:
          BREVO_SMTP_USER:    ${{ secrets.BREVO_SMTP_USER }}
          BREVO_SMTP_PASS:    ${{ secrets.BREVO_SMTP_PASS }}
          BREVO_API_KEY:      ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID:      "2"
          BREVO_SENDER_EMAIL: newsletter@amcupon.ro
          BREVO_SENDER_NAME:  AmCupon.ro
        run: |
          if [ -n "$BREVO_SMTP_PASS" ]; then
            echo "Trimite newsletter via Brevo SMTP..."
            python send_newsletter.py
          else
            echo "BREVO_SMTP_PASS nu e setat — skip newsletter"
          fi

      # ── 10. Telegram — top oferte zilnice — rulat DOAR la 08:00 Romania ──
      - name: Postare Telegram canal oferte
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        continue-on-error: true   # non-critic
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python telegram_daily.py

      # ── 11. Generator continut social media pe NISE — la 08:00 Romania ────
      - name: Genereaza continut social media pe nise
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        continue-on-error: true   # non-critic
        working-directory: scripts
        run: python generate_social_content.py

      # ── 12. Genereaza bannere automat (Pillow) ────────────────────────────
      - name: Genereaza bannere sociale (Pillow)
        if: >
          github.event.schedule == '0 6 * * *' ||
          github.event.schedule == '0 17 * * *' ||
          github.event_name == 'workflow_dispatch'
        continue-on-error: true
        working-directory: scripts
        run: python generate_banner_auto.py

      # ── 12b. Facebook Page auto-posting ──────────────────────────────────
      - name: Postare automata Facebook Page (dimineata + seara)
        if: >
          github.event.schedule == '0 6 * * *' ||
          github.event.schedule == '0 17 * * *' ||
          github.event_name == 'workflow_dispatch'
        continue-on-error: true
        working-directory: scripts
        env:
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: python post_facebook.py

      # ── 12c. Instagram auto-posting ───────────────────────────────────────
      - name: Postare automata Instagram Business
        if: >
          github.event.schedule == '0 6 * * *' ||
          github.event.schedule == '0 17 * * *' ||
          github.event_name == 'workflow_dispatch'
        continue-on-error: true
        working-directory: scripts
        env:
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          BANNER_PUBLIC_URL:      "https://amcupon.ro/banner-categorii.png"
        run: python post_instagram.py

      # ── 13. Health check freshness ────────────────────────────────────────
      - name: Health check — verifica freshness output.json
        continue-on-error: true   # non-critic — nu blocheaza deploy-ul
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python health_check.py

      # ── 14. Commit & Push ──────────────────────────────────────────────────
      - name: Commit si push date actualizate
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/public/output.json       || true
          git add frontend/public/nav-index.json    || true
          git add frontend/public/blog-posts.json   || true
          git add frontend/public/blog-latest.json  || true
          git add frontend/public/products.json     || true
          git add frontend/public/products-home.json || true
          git add frontend/public/recomandate.json || true
          git add frontend/public/store-descriptions.json || true
          git add data/RAPORT-TOP-CASTIG.md        || true
          git add frontend/public/banners.json     || true
          git add frontend/public/top-produse.json || true
          git add data/output.json                 || true
          git add data/profitshare_output.json     || true
          git add data/banners_raw_debug.json      || true
          git add data/social-content.json         || true
          git add data/social-content-today.txt    || true
          git add data/social-nisa-*.txt           || true
          git add data/banner_daily.png            || true
          git add data/banner_story.png            || true

          if git diff --staged --quiet; then
            echo "Nicio schimbare — skip commit"
          else
            git commit -m "chore: actualizare automata $(date -u +%Y-%m-%d)"
            # Retry loop — evita conflict cand doua workflow-uri ruleaza simultan
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && echo "✅ Date noi publicate — Vercel redeploys automat" && break
              echo "⚠ Push esuat (tentativa $i/5) — retrying in ${i}0s..."
              sleep $((i * 10))
            done
          fi
