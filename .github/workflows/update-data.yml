name: Actualizare Automata Date & Blog

on:
  schedule:
    - cron: '0 6 * * *'   # Zilnic la 08:00 ora Romaniei (UTC+6)
  workflow_dispatch:        # Buton manual in GitHub → Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Instaleaza dependinte
        run: pip install -r scripts/requirements.txt

      # ── 3. 2Performant data — API direct (inlocuieste SHOPS.xlsx) ──────────
      - name: Fetch date 2Performant via API (nu mai e nevoie de SHOPS.xlsx)
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_TOKEN: ${{ secrets.TWOPEFORMANT_TOKEN }}
        run: |
          if [ -n "$TWOPEFORMANT_USER" ]; then
            echo "Ruleaza fetch_2p_api (API direct)..."
            python fetch_2p_api.py
          else
            echo "Credentiale lipsa — ruleaza process_data.py cu SHOPS.xlsx existent"
            python process_data.py
          fi

      # ── 4. Profitshare (optional — necesar secret PROFITSHARE_USER) ────────
      - name: Proceseaza date Profitshare
        working-directory: scripts
        env:
          PROFITSHARE_USER: ${{ secrets.PROFITSHARE_USER }}
          PROFITSHARE_KEY:  ${{ secrets.PROFITSHARE_KEY }}
        run: |
          if [ -n "$PROFITSHARE_USER" ]; then
            echo "Ruleaza Profitshare..."
            python process_profitshare.py
          else
            echo "PROFITSHARE_USER nu e setat — skip Profitshare"
          fi

      # ── 5. Merge platforme ─────────────────────────────────────────────────
      - name: Merge 2Performant + Profitshare
        working-directory: scripts
        run: python merge_platforms.py

      # ── 6. Product Feeds XML (optional — necesar secret TWOPEFORMANT_USER) ─
      - name: Fetch product feeds XML (2Performant)
        working-directory: scripts
        env:
          TWOPEFORMANT_USER:  ${{ secrets.TWOPEFORMANT_USER }}
          TWOPEFORMANT_TOKEN: ${{ secrets.TWOPEFORMANT_TOKEN }}
        run: |
          if [ -n "$TWOPEFORMANT_USER" ]; then
            echo "Ruleaza fetch_product_feeds..."
            python fetch_product_feeds.py
          else
            echo "TWOPEFORMANT_USER nu e setat — skip product feeds"
          fi

      # ── 7. Blog automat ────────────────────────────────────────────────────
      - name: Genereaza articole blog din promotii active
        working-directory: scripts
        run: python generate_blog.py

      - name: Genereaza articole Cel mai bun X
        working-directory: scripts
        run: python generate_best_of.py

      # ── 8. Commit & Push ───────────────────────────────────────────────────
      - name: Commit si push date actualizate
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/public/output.json      || true
          git add frontend/public/blog-posts.json  || true
          git add frontend/public/products.json    || true
          git add data/output.json                 || true
          git add data/profitshare_output.json     || true

          if git diff --staged --quiet; then
            echo "Nicio schimbare — skip commit"
          else
            git commit -m "chore: actualizare automata $(date -u +%Y-%m-%d)"
            git push
            echo "✅ Date noi publicate — Vercel redeploys automat"
          fi
