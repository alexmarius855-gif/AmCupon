<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AmCupon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111827;
      background: #f9fafb;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 16px;
      font-weight: 800;
      color: #10b981;
      letter-spacing: -0.3px;
    }
    .logo span { color: #fff; }
    .btn-refresh {
      background: none;
      border: 1px solid #334155;
      border-radius: 5px;
      color: #94a3b8;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-refresh:hover { border-color: #10b981; color: #10b981; }

    /* ── Site detectat ───────────────────────────────────────────── */
    .site-bar {
      padding: 8px 16px;
      background: #1e293b;
      font-size: 11px;
      color: #64748b;
    }
    .site-bar span { color: #e2e8f0; font-weight: 600; }

    /* ── Body ───────────────────────────────────────────────────── */
    .body { padding: 14px 16px; }

    /* ── Stari ──────────────────────────────────────────────────── */
    .state-loading,
    .state-notfound,
    .state-nodata {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      color: #6b7280;
      gap: 8px;
      text-align: center;
    }
    .state-loading .spinner {
      width: 24px; height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-notfound .emoji { font-size: 28px; }
    .state-notfound .label { font-size: 13px; font-weight: 600; color: #374151; }
    .state-notfound .sub   { font-size: 11px; }

    /* ── Card magazin ───────────────────────────────────────────── */
    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-logo {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      object-fit: contain;
      background: #fff;
      flex-shrink: 0;
    }
    .card-logo-fallback {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      color: #10b981; font-size: 16px; font-weight: 800;
      flex-shrink: 0;
    }
    .card-name  { font-size: 14px; font-weight: 700; color: #111827; }
    .card-trust { font-size: 11px; color: #10b981; margin-top: 2px; }

    /* ── Coupon ─────────────────────────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin: 10px 0 6px;
    }
    .coupon-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 2px dashed #16a34a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .coupon-code {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #15803d;
      letter-spacing: 2px;
    }
    .btn-copy {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-copy:hover   { background: #15803d; }
    .btn-copy.copied  { background: #0f172a; }

    /* ── Promotie text ───────────────────────────────────────────── */
    .promo-text {
      font-size: 12px;
      color: #374151;
      line-height: 1.5;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }

    /* ── Cashback badge ─────────────────────────────────────────── */
    .cashback-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #0f172a;
      color: #10b981;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    /* ── CTA butoane ─────────────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      background: #10b981;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      transition: background .15s;
    }
    .btn-primary:hover { background: #059669; }

    /* ── Footer ─────────────────────────────────────────────────── */
    .footer {
      border-top: 1px solid #e5e7eb;
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: #9ca3af;
      background: #fff;
    }
    .footer a { color: #6b7280; text-decoration: none; }
    .footer a:hover { color: #10b981; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">AmCupon<span>.ro</span></div>
    <button class="btn-refresh" id="btnRefresh">&#8635; Refresh</button>
  </div>

  <!-- Site detectat -->
  <div class="site-bar" id="siteBar">
    Detectez site-ul...
  </div>

  <!-- Body dinamic -->
  <div class="body" id="content">
    <div class="state-loading">
      <div class="spinner"></div>
      <div>Se cauta oferte...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://amcupon.ro" target="_blank">amcupon.ro</a>
    &middot; Toate reducerile Romaniei
  </div>

  <script src="popup.js"></script>
</body>
</html>
