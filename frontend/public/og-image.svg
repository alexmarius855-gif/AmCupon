<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#F97316" opacity="0.06"/>
  <circle cx="150" cy="530" r="140" fill="#10B981" opacity="0.06"/>
  <circle cx="950" cy="550" r="100" fill="#F97316" opacity="0.04"/>

  <!-- Ticket icon (simplified) -->
  <path d="M 120,200 L 360,200 Q 380,200 380,220 L 380,260 A 18,18 0 0,0 380,296 L 380,340 Q 380,360 360,360 L 120,360 Q 100,360 100,340 L 100,296 A 18,18 0 0,1 100,260 L 100,220 Q 100,200 120,200 Z"
    fill="url(#og)" opacity="0.95"/>
  <text x="240" y="292" font-family="Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">%</text>
  <!-- Checkmark badge -->
  <circle cx="360" cy="348" r="16" fill="white"/>
  <circle cx="360" cy="348" r="13" fill="url(#em)"/>
  <path d="M 353,348 L 359,354 L 368,340" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Logo text -->
  <rect x="100" y="405" width="72" height="52" rx="10" fill="#F97316"/>
  <text x="136" y="434" font-family="Helvetica,Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">Am</text>
  <text x="222" y="434" font-family="Helvetica,Arial,sans-serif" font-size="36" font-weight="900" fill="white" dominant-baseline="middle">Cupon</text>
  <text x="355" y="434" font-family="Helvetica,Arial,sans-serif" font-size="36" font-weight="900" fill="#F97316" dominant-baseline="middle">.ro</text>

  <!-- Main headline -->
  <text x="460" y="240" font-family="Helvetica,Arial,sans-serif" font-size="56" font-weight="900" fill="white">Coduri de reducere</text>
  <text x="460" y="310" font-family="Helvetica,Arial,sans-serif" font-size="56" font-weight="900" fill="#FB923C">verificate zilnic</text>

  <!-- Sub-headline -->
  <text x="460" y="375" font-family="Helvetica,Arial,sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Peste 200 magazine partenere · 100% gratuit</text>

  <!-- Stats pills -->
  <rect x="460" y="415" width="190" height="44" rx="22" fill="#F97316" opacity="0.15"/>
  <text x="555" y="440" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#FB923C" text-anchor="middle" dominant-baseline="middle">200+ magazine</text>

  <rect x="665" y="415" width="200" height="44" rx="22" fill="#10B981" opacity="0.15"/>
  <text x="765" y="440" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#34D399" text-anchor="middle" dominant-baseline="middle">Actualizat zilnic</text>

  <rect x="880" y="415" width="170" height="44" rx="22" fill="#6366f1" opacity="0.15"/>
  <text x="965" y="440" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle" dominant-baseline="middle">Gratuit 100%</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="white" opacity="0.04"/>
  <text x="600" y="612" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="500" fill="#64748b" text-anchor="middle" dominant-baseline="middle">amcupon.ro · Coduri de reducere Romania</text>
