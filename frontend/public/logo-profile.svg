<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

  <!-- Background: premium dark blue -->
  <rect width="500" height="500" rx="85" fill="#0F2240"/>

  <!-- Shopping bag handles (white arc above bag) -->
  <path d="M 178 210 L 178 162 Q 178 118 250 118 Q 322 118 322 162 L 322 210"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Bag body: white filled -->
  <rect x="112" y="205" width="276" height="198" rx="16" fill="white"/>

  <!-- Orange coupon strip across center of bag -->
  <rect x="112" y="272" width="276" height="86" fill="#F97316"/>

  <!-- Left notch on coupon strip -->
  <circle cx="112" cy="315" r="22" fill="#0F2240"/>

  <!-- Right notch on coupon strip -->
  <circle cx="388" cy="315" r="22" fill="#0F2240"/>

  <!-- Perforation dots on coupon -->
  <circle cx="250" cy="278" r="3.5" fill="#ffffff50"/>
  <circle cx="250" cy="292" r="3.5" fill="#ffffff50"/>
  <circle cx="250" cy="306" r="3.5" fill="#ffffff50"/>
  <circle cx="250" cy="320" r="3.5" fill="#ffffff50"/>
  <circle cx="250" cy="334" r="3.5" fill="#ffffff50"/>
  <circle cx="250" cy="348" r="3.5" fill="#ffffff50"/>

  <!-- % symbol on orange coupon strip -->
  <text
    x="250"
    y="319"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="94"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle">%</text>

  <!-- Bag top fold line -->
  <line x1="112" y1="230" x2="388" y2="230"
    stroke="#e5e7eb"
    stroke-width="1.5"
    opacity="0.6"/>

  <!-- Bottom section: subtle "AmCupon" label -->
  <text
    x="250"
    y="377"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#0F2240"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1">AmCupon.ro</text>

  <!-- Orange dot accent top-right -->
  <circle cx="398" cy="88" r="28" fill="#F97316"/>
  <text
    x="398"
    y="94"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle">✓</text>

</svg>
